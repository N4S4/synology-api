name: pre-commit

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies for Python build
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libbz2-dev \
          libreadline-dev \
          liblzma-dev \
          libssl-dev \
          libsqlite3-dev \
          libffi-dev \
          zlib1g-dev
    - name: Cache asdf
      uses: actions/cache@v4
      with:
        path: |
          ~/.asdf
        key: ${{ runner.os }}-asdf-v2-${{ hashFiles('.tool-versions') }}
        restore-keys: |
          ${{ runner.os }}-asdf-
    - uses: asdf-vm/actions/install@v4
    - uses: pre-commit/action@v3.0.1
#      env:
#        SKIP: hook-id-to-skip
